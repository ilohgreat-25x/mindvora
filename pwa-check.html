<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mindvora PWA Check</title>
<style>
body{font-family:sans-serif;background:#0a1a0f;color:#fefce8;padding:20px;max-width:600px;margin:0 auto}
h2{color:#22c55e}
.check{padding:10px 14px;margin:6px 0;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:10px}
.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3)}
.fail{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3)}
.pending{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.icon{font-size:18px}
</style>
</head>
<body>
<h2>🔍 Mindvora PWA Asset Checker</h2>
<p style="font-size:12px;color:#86efac">Run this on your Vercel domain to confirm all assets load correctly before PWABuilder.</p>
<div id="results"></div>
<script>
var BASE = window.location.origin;
var checks = [
  {url: '/manifest.json',           label: 'manifest.json'},
  {url: '/firebase-messaging-sw.js',label: 'firebase-messaging-sw.js'},
  {url: '/icons/icon-72.png',       label: 'icon-72.png'},
  {url: '/icons/icon-96.png',       label: 'icon-96.png'},
  {url: '/icons/icon-128.png',      label: 'icon-128.png'},
  {url: '/icons/icon-144.png',      label: 'icon-144.png'},
  {url: '/icons/icon-152.png',      label: 'icon-152.png'},
  {url: '/icons/icon-192.png',      label: 'icon-192.png'},
  {url: '/icons/icon-192-maskable.png', label: 'icon-192-maskable.png'},
  {url: '/icons/icon-384.png',      label: 'icon-384.png'},
  {url: '/icons/icon-512.png',      label: 'icon-512.png'},
  {url: '/icons/icon-512-maskable.png', label: 'icon-512-maskable.png'},
];
var div = document.getElementById('results');
checks.forEach(function(c){
  var el = document.createElement('div');
  el.className = 'check pending';
  el.id = 'c-'+c.label;
  el.innerHTML = '<span class="icon">⏳</span><span>' + c.label + ' — checking…</span>';
  div.appendChild(el);
  fetch(BASE + c.url, {method:'HEAD'})
    .then(function(r){
      el.className = 'check ' + (r.ok ? 'ok' : 'fail');
      el.innerHTML = '<span class="icon">' + (r.ok ? '✅' : '❌') + '</span><span>' + c.label + ' — ' + (r.ok ? 'HTTP '+r.status+' OK' : 'HTTP '+r.status+' FAILED') + '</span>';
    })
    .catch(function(){
      el.className = 'check fail';
      el.innerHTML = '<span class="icon">❌</span><span>' + c.label + ' — Network error / Not found</span>';
    });
});
</script>
</body>
</html>
